<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo/logo.jpeg" />
    <link rel="apple-touch-icon" href="/logo/logo.jpeg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hawaiin Elevation" />
    <meta name="description" content="Complete tender and procurement management system for Hawaiin Elevation Pvt Ltd" />
    <meta name="author" content="RettsWebDev" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="-1" />
    <script>
      // AGGRESSIVE CACHE CLEAR - Run immediately before anything else
      (function() {
        const CACHE_KEY = 'bw_cache_cleared_v2';
        const lastClear = sessionStorage.getItem(CACHE_KEY);
        
        // Clear cache on every new deployment (check every page load)
        if (!lastClear || Date.now() - parseInt(lastClear) > 5000) {
          console.log('[CACHE] Clearing all caches...');
          
          // Clear all browser caches
          if (caches && caches.keys) {
            caches.keys().then(names => {
              names.forEach(name => caches.delete(name));
            });
          }
          
          // Unregister all service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
              regs.forEach(reg => reg.unregister());
            });
          }
          
          // Mark as cleared
          sessionStorage.setItem(CACHE_KEY, Date.now().toString());
          
          // Force hard reload once
          if (!window.location.hash.includes('nocache')) {
            window.location.hash = 'nocache' + Date.now();
            window.location.reload(true);
          }
        }
      })();
    </script>
    <title>Hawaiin Elevation - Tender & Procurement Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker for PWA installability
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
              // Check for updates
              registration.update();
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
